<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100">
  <defs>
    <radialGradient id="g" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#d7f0cf"/>
      <stop offset="55%" stop-color="#8fd08a"/>
      <stop offset="100%" stop-color="#3f7a44"/>
    </radialGradient>
    <radialGradient id="v" cx="50%" cy="45%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.32"/>
    </radialGradient>
    <style>
      .pet { transform-box: fill-box; transform-origin: center bottom; animation: excite 0.5s ease-in-out infinite; }
      @keyframes excite {
        0%,100% { transform: translateY(0) rotate(-4deg); }
        50%     { transform: translateY(-26px) rotate(4deg); }
      }
      .ball { transform-box: fill-box; transform-origin: center; animation: bounce 0.7s cubic-bezier(.5,.05,.5,.95) infinite; }
      @keyframes bounce {
        0%,100% { transform: translateY(-120px) scale(1,1); }
        45%     { transform: translateY(60px) scale(1.1,0.9); }
        55%     { transform: translateY(60px) scale(1.1,0.9); }
      }
    </style>
  </defs>
  <rect width="900" height="1100" fill="url(#g)"/>
  <text class="pet" x="450" y="560" font-size="360" text-anchor="middle" dominant-baseline="central">🐕</text>
  <text class="ball" x="650" y="640" font-size="120" text-anchor="middle" dominant-baseline="central">🎾</text>
  <rect width="900" height="1100" fill="url(#v)"/>
  <text x="450" y="150" font-size="30" fill="#fff" fill-opacity="0.7" text-anchor="middle" font-family="sans-serif">AI 생성 이미지 자리 · 교체용</text>
  <text x="450" y="960" font-size="66" fill="#fff" text-anchor="middle" font-family="sans-serif" font-weight="700">신남 · play</text>
</svg>
